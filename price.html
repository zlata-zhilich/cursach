<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./style.css" rel="stylesheet" />
    <link href="price.css" rel="stylesheet" />
</head>

<body>
    <header class="header">
        <div class="header-logo">
            <svg width="200" height="60" xmlns="http://www.w3.org/2000/svg">
                <rect width="200" height="100" fill="#896e69" rx="8" ry="8" />
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white"
                    font-family="Arial, sans-serif" font-size="24" font-weight="bold">GOOD TATOO</text>
            </svg>
        </div>
        <nav class="header-menu">
            <a href="./index.html">Главная</a>
            <a href="./gallery.html">Галерея</a>
            <a href="./price.html">Стоимость</a>
        </nav>
    </header>
    <section class="price-calc">
        <div class="price-form">
            <div class="price-item  tatoo-size">
                <p>Размер тату</p>
                <input placeholder="Ширина" id="calc-width" />
                <input placeholder="Длина" id="calc-height" />
            </div>

            <div class="price-item">
                <p>Детализация</p>
                <div>
                    <input type="radio" name="detail" id="detail-max" />
                    <label for="detail-max">Сложная Детализация</label>
                </div>
                <div>
                    <input type="radio" name="detail" id="detail-mid" />
                    <label for="detail-mid">Средняя Детализация</label>
                </div>

                <div>
                    <input type="radio" name="detail" id="detail-min" />
                    <label for="detail-min">Простая Детализация</label>
                </div>

            </div>

            <div class="price-item">
                <p>Цветность</p>
                <div> <input type="radio" name="color" id="black" />
                    <label for="black">Черная тату</label>
                </div>
                <div> <input type="radio" name="color" id="colored" />
                    <label for="colored">Цветная тату</label>
                </div>


            </div>

            <div class="price-item">
                <p>Разработка эскиза</p>
                <div> <input type="radio" name="design" id="design-my" />
                    <label for="design-my">Свой дизайн</label>
                </div>
                <div> <input type="radio" name="design" id="design-dev" />
                    <label for="design-dev">Разработка дизайна</label>
                </div>

            </div>
            <div class="price-item">
                <button id="calc-price">Посчетать Стоимость</button>
                <h3>Цена:
                    <span id="price-result"></span>
                </h3>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="footer-left">
            <div class="header-logo footer-logo">Good tatoo</div>
            <h3>+375(29)111-11-11</h3>
            <h3>goodtatoo@gmail.com</h3>
        </div>

        <div class="footer-right">
            <p>Нас можно найти по адресу ул.Ежи Гедройца,дом 15</p>
        </div>
    </footer>
    <script src="./script.js"></script>
</body>


</html>
